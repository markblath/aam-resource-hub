function DirectorySection() {
  const [q, setQ] = useStateS("");
  const [state, setState] = useStateS("All");
  const [level, setLevel] = useStateS("All");
  const [selected, setSelected] = useStateS(null);
  const [composeOpen, setComposeOpen] = useStateS(false);
  const [members, setMembers] = useStateS(null);
  const [loadError, setLoadError] = useStateS(false);
  const states = ["All","NSW","VIC","QLD","WA","SA","TAS","ACT","NT","Other - Overseas"];
  const levels = useMemoS(() => {
    if (!members) return ["All"];
    const unique = [...new Set(members.map((m) => m.level))].sort();
    return ["All", ...unique];
  }, [members]);

  useEffectS(() => {
    fetch("/api/members")
      .then((r) => r.ok ? r.json() : Promise.reject())
      .then((data) => setMembers(data.members || []))
      .catch(() => setLoadError(true));
  }, []);

  const filtered = useMemoS(() => {
    if (!members) return [];
    let list = members;
    if (state !== "All") list = list.filter((m) => m.state === state);
    if (level !== "All") list = list.filter((m) => m.level === level);
    const query = q.trim().toLowerCase();
    if (query) list = list.filter((m) =>
      (m.firstName + " " + m.lastName).toLowerCase().includes(query) ||
      (m.org || "").toLowerCase().includes(query) ||
      (m.artists || []).some((a) => a.toLowerCase().includes(query)) ||
      (m.city || "").toLowerCase().includes(query)
    );
    return list;
  }, [q, state, level, members]);

  if (loadError) return (
    <div style={{ maxWidth: 1280, margin: "0 auto", padding: "48px 32px", textAlign: "center", fontFamily: "'Inter', sans-serif", color: "#6B6B66" }}>
      Could not load member directory. Please try refreshing the page.
    </div>
  );

  if (!members) return (
    <div style={{ maxWidth: 1280, margin: "0 auto", padding: "80px 32px", display: "flex", flexDirection: "column", alignItems: "center", gap: 16 }}>
      <style>{`@keyframes aam-spin { to { transform: rotate(360deg); } }`}</style>
      <div style={{ width: 32, height: 32, borderRadius: 999, border: "3px solid #C8F035", borderTopColor: "transparent", animation: "aam-spin 0.7s linear infinite" }}/>
      <div style={{ fontFamily: "'Inter', sans-serif", fontSize: 14, color: "#8A8A82" }}>Loading member directory…</div>
    </div>
  );

  return (
    <div style={{ maxWidth: 1280, margin: "0 auto", padding: "0 32px" }}>
      <div style={{ background: "#FFFFFF", border: "1px solid #E6E6E1", borderRadius: 14, padding: "16px 18px", marginTop: -32, marginBottom: 24, position: "relative", zIndex: 2, boxShadow: "0 8px 24px -16px rgba(26,26,26,0.12)", display: "grid", gridTemplateColumns: "1.6fr 1fr 1fr auto", gap: 12, alignItems: "center" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10, background: "#F7F7F5", border: "1px solid #E6E6E1", borderRadius: 10, padding: "10px 14px" }}>
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="7" cy="7" r="5" stroke="#1A1A1A" strokeWidth="1.6"/><path d="M11 11L14 14" stroke="#1A1A1A" strokeWidth="1.6" strokeLinecap="round"/></svg>
          <input value={q} onChange={(e) => setQ(e.target.value)} placeholder="Search member, org, or artist..." style={{ flex: 1, border: "none", outline: "none", background: "transparent", fontFamily: "'Inter', sans-serif", fontSize: 15 }}/>
        </div>
        <SelectLite value={state} onChange={setState} options={states} label="State"/>
        <SelectLite value={level} onChange={setLevel} options={levels} label="Level"/>
        <div style={{ fontFamily: "'Work Sans', sans-serif", fontWeight: 700, fontSize: 12, letterSpacing: "0.1em", textTransform: "uppercase", color: "#1A1A1A", whiteSpace: "nowrap", textAlign: "right" }}>{filtered.length} <span style={{ opacity: 0.55 }}>members</span></div>
      </div>
      <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 20, padding: "10px 14px", background: "rgba(200,240,53,0.25)", border: "1px solid #C8F035", borderRadius: 10, fontFamily: "'Inter', sans-serif", fontSize: 13, color: "#1A1A1A" }}>
        <span style={{ width: 8, height: 8, borderRadius: 999, background: "#1A1A1A" }}/>
        <strong style={{ fontFamily: "'Work Sans', sans-serif", fontWeight: 700 }}>Live from Wild Apricot</strong>
        <span style={{ opacity: 0.7 }}>— only currently-active members are shown.</span>
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(280px, 1fr))", gap: 16, paddingBottom: 96 }}>
        {filtered.map((m) => <MemberCard key={m.id} member={m} onOpen={() => setSelected(m)}/>)}
        {filtered.length === 0 && <div style={{ gridColumn: "1 / -1", border: "1.5px dashed #D6D6D0", borderRadius: 14, padding: "48px 24px", textAlign: "center", fontFamily: "'Inter', sans-serif", color: "#6B6B66" }}>No members match those filters.</div>}
      </div>
      {selected && <MemberSheet member={selected} onClose={() => setSelected(null)} onMessage={() => setComposeOpen(true)}/>}
      {composeOpen && selected && <ComposeMessage member={selected} onClose={() => setComposeOpen(false)}/>}
    </div>
  );
}

    <article style={{ background: "#FFFFFF", border: "1.5px solid #1A1A1A", borderRadius: 14, padding: "22px 24px 20px", display: "flex", flexDirection: "column" }}>

      </div>

          <span>{signedTotal.toLocaleString()} signatures</span>
          <span style={{ color: "#8A8A82" }}>Goal {campaign.target.toLocaleString()}</span>
        </div>
        <div style={{ height: 6, background: "#EEEEE9", borderRadius: 999, overflow: "hidden" }}>
          <div style={{ width: `${pct}%`, height: "100%", background: "#C8F035", transition: "width 400ms ease" }}/>
        </div>

      <div style={{ marginTop: 12, fontFamily: "'Inter', sans-serif", fontSize: 12, color: "#8A8A82" }}>

function ProgramCard({ program, started, onStart }) {
  const statusColor = { Open: "#C8F035", Rolling: "#FFE156", Closed: "#E6E6E1" }[program.status] || "#E6E6E1";
  const isOpen = program.status === "Open" || program.status === "Rolling";
  const daysLeft = isOpen && program.status !== "Rolling"
    ? Math.max(0, Math.round((new Date(program.deadline) - new Date("2026-04-19")) / 86400000))
    : null;
  return (
    <article style={{ background: "#FFFFFF", border: "1px solid #E6E6E1", borderRadius: 14, padding: 0, overflow: "hidden", display: "flex", flexDirection: "column", opacity: program.status === "Closed" ? 0.62 : 1 }}>
      <div style={{ padding: "20px 24px 4px", display: "flex", alignItems: "center", justifyContent: "space-between", gap: 10 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          <span style={{ display: "inline-flex", alignItems: "center", gap: 6, padding: "4px 10px", borderRadius: 6, background: statusColor, color: "#1A1A1A", fontFamily: "'Work Sans', sans-serif", fontWeight: 700, fontSize: 10.5, letterSpacing: "0.14em", textTransform: "uppercase" }}>{program.status}</span>
          <span style={{ fontFamily: "'Work Sans', sans-serif", fontWeight: 700, fontSize: 10.5, letterSpacing: "0.14em", textTransform: "uppercase", color: "#F95B4A" }}>{program.type}</span>
        </div>
        {daysLeft !== null && <span style={{ fontFamily: "'Work Sans', sans-serif", fontWeight: 700, fontSize: 10.5, letterSpacing: "0.1em", textTransform: "uppercase", color: "#1A1A1A", background: "#F7F7F5", border: "1px solid #E6E6E1", padding: "4px 10px", borderRadius: 6 }}>{daysLeft}d left</span>}
      </div>
      <div style={{ padding: "10px 24px 18px" }}>
        <h3 style={{ fontFamily: "'Work Sans', sans-serif", fontWeight: 800, fontSize: 24, letterSpacing: "-0.02em", color: "#1A1A1A", margin: "0 0 8px 0", lineHeight: 1.1 }}>{program.title}</h3>
        <p style={{ fontFamily: "'Inter', sans-serif", fontSize: 14.5, lineHeight: 1.5, color: "#5C5C56", margin: 0 }}>{program.subtitle}</p>
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 1, background: "#EEEEE9", margin: "0 24px", borderRadius: 10, overflow: "hidden", border: "1px solid #EEEEE9" }}>
        <KV label="Deadline" value={program.status === "Rolling" ? "Rolling" : new Date(program.deadline).toLocaleDateString("en-AU", { day: "numeric", month: "short" })}/>
        <KV label="Places" value={program.spots}/>
        <KV label="Eligibility" value={program.eligibility} wide/>
      </div>
      <div style={{ margin: "20px 24px 22px", display: "flex", gap: 10 }}>
        {isOpen ? (
          <>
            <button onClick={started ? undefined : onStart} style={{ flex: 1, padding: "12px 14px", borderRadius: 999, border: "none", background: started ? "#C8F035" : "#1A1A1A", color: started ? "#1A1A1A" : "#C8F035", cursor: started ? "default" : "pointer", fontFamily: "'Work Sans', sans-serif", fontWeight: 700, fontSize: 12, letterSpacing: "0.1em", textTransform: "uppercase" }}>
              {started ? "✓ Application started" : "Start application →"}
            </button>
            <button style={btnGhost()}>Details</button>
          </>
        ) : (
          <button disabled style={{ flex: 1, padding: "12px 14px", borderRadius: 999, border: "1px solid #E6E6E1", background: "#F7F7F5", color: "#8A8A82", cursor: "not-allowed", fontFamily: "'Work Sans', sans-serif", fontWeight: 700, fontSize: 12, letterSpacing: "0.1em", textTransform: "uppercase" }}>Applications closed</button>
        )}
      </div>
    </article>
  );
}

function ProgramsSection() {
  const [started, setStarted] = useStateS({});
  return (
    <div style={{ maxWidth: 1280, margin: "0 auto", padding: "12px 32px 96px" }}>
      <SectionLabel>Open for Applications</SectionLabel>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(380px, 1fr))", gap: 20 }}>
        {window.PROGRAMS.map((p) => <ProgramCard key={p.id} program={p} started={!!started[p.id]} onStart={() => setStarted((s) => ({ ...s, [p.id]: true }))}/>)}
      </div>
    </div>
  );
}

// ── EVENTS ──────────────────────────────────────────────────────────────
function EventRow({ event, registered, onRegister }) {
  const d = new Date(event.date);
  const spotsLeft = event.total - event.spots;
  const nearlyFull = spotsLeft < event.total * 0.15;
  return (
    <article style={{ background: "#FFFFFF", border: "1px solid #E6E6E1", borderRadius: 14, padding: "18px 22px 18px 18px", display: "grid", gridTemplateColumns: "88px 1fr auto", gap: 22, alignItems: "center" }} className="aam-event-row">
      <div style={{ background: "#1A1A1A", color: "#C8F035", borderRadius: 10, padding: "14px 10px", textAlign: "center" }}>
        <div style={{ fontFamily: "'Work Sans', sans-serif", fontWeight: 700, fontSize: 10.5, letterSpacing: "0.16em", textTransform: "uppercase", opacity: 0.8 }}>{d.toLocaleDateString("en-AU", { month: "short" })}</div>
        <div style={{ fontFamily: "'Work Sans', sans-serif", fontWeight: 800, fontSize: 34, lineHeight: 1, letterSpacing: "-0.02em", marginTop: 4 }}>{d.getDate()}</div>
        <div style={{ fontFamily: "'Work Sans', sans-serif", fontWeight: 600, fontSize: 10, letterSpacing: "0.12em", textTransform: "uppercase", opacity: 0.65, marginTop: 4 }}>{d.toLocaleDateString("en-AU", { weekday: "short" })}</div>
      </div>
      <div>
        <div style={{ display: "flex", gap: 8, marginBottom: 8, flexWrap: "wrap" }}>
          <Tag>{event.tag}</Tag>
          <Tag muted>{event.format}</Tag>
          {nearlyFull && <Tag>Nearly full</Tag>}
        </div>
        <h3 style={{ fontFamily: "'Work Sans', sans-serif", fontWeight: 700, fontSize: 19, letterSpacing: "-0.015em", color: "#1A1A1A", margin: "0 0 4px 0" }}>{event.title}</h3>
        <div style={{ fontFamily: "'Inter', sans-serif", fontSize: 13.5, color: "#6B6B66", marginBottom: 6 }}>{event.time} · {event.venue}</div>
        <div style={{ fontFamily: "'Inter', sans-serif", fontSize: 13.5, color: "#5C5C56", lineHeight: 1.45, display: "-webkit-box", WebkitLineClamp: 2, WebkitBoxOrient: "vertical", overflow: "hidden", maxWidth: 620 }}>{event.desc}</div>
      </div>
      <div style={{ textAlign: "right" }}>
        <div style={{ fontFamily: "'Work Sans', sans-serif", fontWeight: 700, fontSize: 11, letterSpacing: "0.1em", textTransform: "uppercase", color: "#8A8A82", marginBottom: 8 }}>{spotsLeft} / {event.total} spots left</div>
        <button onClick={registered ? undefined : onRegister} style={{ padding: "11px 18px", borderRadius: 999, border: "none", background: registered ? "#C8F035" : "#1A1A1A", color: registered ? "#1A1A1A" : "#C8F035", cursor: registered ? "default" : "pointer", fontFamily: "'Work Sans', sans-serif", fontWeight: 700, fontSize: 12, letterSpacing: "0.1em", textTransform: "uppercase", whiteSpace: "nowrap" }}>
          {registered ? "✓ Registered" : "Register →"}
        </button>
      </div>
    </article>
  );
}

function EventsSection() {
  const [registered, setRegistered] = useStateS({});
  const [filter, setFilter] = useStateS("All");
  const filters = ["All","In-person","Online"];
  const filtered = window.EVENTS.filter((e) => filter === "All" ? true : e.format === filter);
  return (
    <div style={{ maxWidth: 1280, margin: "0 auto", padding: "12px 32px 96px" }}>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 20, flexWrap: "wrap", gap: 12 }}>
        <SectionLabel noMb>Upcoming Events</SectionLabel>
        <div style={{ display: "flex", gap: 6, background: "#FFFFFF", border: "1px solid #E6E6E1", borderRadius: 999, padding: 4 }}>
          {filters.map((f) => {
            const active = f === filter;
            return <button key={f} onClick={() => setFilter(f)} style={{ padding: "7px 14px", borderRadius: 999, background: active ? "#1A1A1A" : "transparent", color: active ? "#C8F035" : "#1A1A1A", border: "none", cursor: "pointer", fontFamily: "'Work Sans', sans-serif", fontWeight: 700, fontSize: 11, letterSpacing: "0.1em", textTransform: "uppercase" }}>{f}</button>;
          })}
        </div>
      </div>
      <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
        {filtered.map((e) => <EventRow key={e.id} event={e} registered={!!registered[e.id]} onRegister={() => setRegistered((r) => ({ ...r, [e.id]: true }))}/>)}
      </div>
    </div>
  );
}

Object.assign(window, { DirectorySection, AdvocacySection, ProgramsSection, EventsSection });
</script>

<!-- ── APP ────────────────────────────────────────────────────────────── -->
<script type="text/babel">
const { useState: useStateApp, useEffect: useEffectApp, useMemo: useMemoApp } = React;

function LoginGate({ authError }) {
  const categories = ["Industry Support + Advocacy","Strategy","Revenue","Marketing","Legal + Finance","Operations + Leadership","Live & Touring","Creative","Partnerships"];
  const stats = [
    { n: String(window.RESOURCES.length), l: "Resources" },
    { n: "9", l: "Categories" },
    { n: String(window.EVENTS.length), l: "Upcoming Events" },
    { n: String(window.PROGRAMS.filter(p => p.status === "Open").length), l: "Open Programs" },
  ];
  return (
    <div style={{ minHeight: "100vh", background: "#1A1A1A", display: "grid", gridTemplateColumns: "1fr 1fr", fontFamily: "'Inter', sans-serif" }}>
      <style>{`
        @media (max-width: 768px) { .aam-login-grid { grid-template-columns: 1fr !important; } .aam-login-left { display: none !important; } }
        @keyframes aam-fade-up { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
        .aam-sign-in-btn:hover { background: #d4f53c !important; transform: translateY(-1px); }
        .aam-sign-in-btn { transition: background 140ms ease, transform 120ms ease !important; }
      `}</style>

      {/* Left panel — brand + preview */}
      <div className="aam-login-left" style={{ background: "#C8F035", padding: "48px 52px", display: "flex", flexDirection: "column", justifyContent: "space-between", position: "relative", overflow: "hidden" }}>
        <div>
          <AAMLogo />
          <h1 style={{ fontFamily: "'Work Sans', sans-serif", fontWeight: 800, fontSize: "clamp(56px,7vw,96px)", lineHeight: 0.88, letterSpacing: "-0.045em", color: "#1A1A1A", margin: "40px 0 0" }}>
            Member<br />Hub<span style={{ color: "#F95B4A" }}>.</span>
          </h1>
          <p style={{ fontFamily: "'Inter', sans-serif", fontSize: 17, color: "rgba(0,0,0,0.62)", margin: "20px 0 0", lineHeight: 1.5, maxWidth: 340 }}>
            Curated resources, programs, advocacy tools and events — built for Australian artist managers.
          </p>
        </div>
        <div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 32 }}>
            {stats.map(s => (
              <div key={s.l} style={{ background: "rgba(0,0,0,0.07)", borderRadius: 10, padding: "14px 16px" }}>
                <div style={{ fontFamily: "'Work Sans', sans-serif", fontWeight: 800, fontSize: 32, letterSpacing: "-0.03em", color: "#1A1A1A", lineHeight: 1 }}>{s.n}</div>
                <div style={{ fontFamily: "'Work Sans', sans-serif", fontWeight: 600, fontSize: 10.5, letterSpacing: "0.1em", textTransform: "uppercase", color: "rgba(0,0,0,0.55)", marginTop: 6 }}>{s.l}</div>
              </div>
            ))}
          </div>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
            {categories.map(c => (
              <span key={c} style={{ padding: "5px 10px", borderRadius: 999, background: "rgba(0,0,0,0.1)", fontFamily: "'Work Sans', sans-serif", fontWeight: 700, fontSize: 10, letterSpacing: "0.1em", textTransform: "uppercase", color: "#1A1A1A" }}>{c}</span>
            ))}
          </div>
        </div>
      </div>

      {/* Right panel — sign in */}
      <div style={{ display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: "48px 52px", animation: "aam-fade-up 0.4s ease both" }}>
        <div style={{ width: "100%", maxWidth: 380 }}>
          <div style={{ marginBottom: 40 }}><AAMLogo inverted /></div>
          <h2 style={{ fontFamily: "'Work Sans', sans-serif", fontWeight: 800, fontSize: 32, letterSpacing: "-0.025em", color: "#FFFFFF", margin: "0 0 10px" }}>Sign in</h2>
          <p style={{ fontSize: 15, color: "rgba(255,255,255,0.55)", margin: "0 0 36px", lineHeight: 1.5 }}>Members only. Use the email and password linked to your AAM membership.</p>

          {authError === "not-member" && (
            <div style={{ background: "rgba(249,91,74,0.12)", border: "1px solid rgba(249,91,74,0.5)", borderRadius: 10, padding: "13px 16px", marginBottom: 24, color: "#F95B4A", fontSize: 14, lineHeight: 1.45 }}>
              Your Wild Apricot account isn't linked to an AAM membership.{" "}
              <a href="https://www.aam.org.au/become-a-member" style={{ color: "#F95B4A", fontWeight: 700 }}>Become a member →</a>
            </div>
          )}
          {(authError === "error" || authError === "denied") && (
            <div style={{ background: "rgba(249,91,74,0.12)", border: "1px solid rgba(249,91,74,0.5)", borderRadius: 10, padding: "13px 16px", marginBottom: 24, color: "#F95B4A", fontSize: 14, lineHeight: 1.45 }}>
              Something went wrong signing you in. Please try again.
            </div>
          )}

          <a href="/api/login" className="aam-sign-in-btn" style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 10, width: "100%", padding: "16px 24px", borderRadius: 12, background: "#C8F035", color: "#1A1A1A", fontFamily: "'Work Sans', sans-serif", fontWeight: 800, fontSize: 14, letterSpacing: "0.08em", textTransform: "uppercase", textDecoration: "none", boxSizing: "border-box" }}>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
            Sign in with Wild Apricot
          </a>

          <div style={{ margin: "28px 0", borderTop: "1px solid rgba(255,255,255,0.08)" }} />

          <p style={{ fontSize: 13, color: "rgba(255,255,255,0.3)", textAlign: "center", lineHeight: 1.55 }}>
            Not a member?{" "}
            <a href="https://www.aam.org.au/become-a-member" style={{ color: "rgba(255,255,255,0.5)", fontWeight: 600 }}>Join AAM</a>
            {" "}to get access.
          </p>
        </div>
      </div>
    </div>
  );
}

function App() {
  const [section, setSection] = useStateApp(() => {
    try { return localStorage.getItem("aam-section") || "resources"; } catch { return "resources"; }
  });
  const [query, setQuery] = useStateApp("");
  const [activeCategory, setActiveCategory] = useStateApp("All");
  const [activeFormat, setActiveFormat] = useStateApp("All formats");
  const [heroVariant] = useStateApp("marquee");
  const [user, setUser] = useStateApp(null);
  const [authError, setAuthError] = useStateApp(null);

  useEffectApp(() => {
    const params = new URLSearchParams(window.location.search);
    const auth = params.get("auth");
    if (auth) window.history.replaceState({}, "", "/");
    if (auth === "not-member" || auth === "error" || auth === "denied") {
      setAuthError(auth);
      setUser(false);
      return;
    }
    fetch("/api/session")
      .then((r) => r.ok ? r.json() : null)
      .then((data) => setUser(data && data.authenticated ? data : false))
      .catch(() => setUser(false));
  }, []);

  useEffectApp(() => {
    try { localStorage.setItem("aam-section", section); } catch {}
    window.scrollTo({ top: 0, behavior: "instant" });
  }, [section]);

  const filtered = useMemoApp(() => {
    let list = window.RESOURCES;
    if (activeCategory !== "All") list = list.filter((r) => r.category === activeCategory);
    if (activeFormat !== "All formats") list = list.filter((r) => r.format === activeFormat);
    const q = query.trim().toLowerCase();
    if (q) list = list.filter((r) => r.title.toLowerCase().includes(q) || r.description.toLowerCase().includes(q) || r.category.toLowerCase().includes(q) || r.source.toLowerCase().includes(q) || r.format.toLowerCase().includes(q) || r.region.toLowerCase().includes(q));
    return list;
  }, [query, activeCategory, activeFormat]);

  const clearFilters = () => { setQuery(""); setActiveCategory("All"); setActiveFormat("All formats"); };

  if (user === null) {
    return (
      <div style={{ minHeight: "100vh", background: "#1A1A1A", display: "grid", placeItems: "center" }}>
        <div style={{ width: 32, height: 32, borderRadius: 999, border: "3px solid #C8F035", borderTopColor: "transparent", animation: "aam-spin 0.7s linear infinite" }} />
        <style>{`@keyframes aam-spin { to { transform: rotate(360deg); } }`}</style>
      </div>
    );
  }

  if (!user) return <LoginGate authError={authError} />;

  const onLogout = () => { window.location.href = "/api/logout"; };

  return (
    <div style={{ minHeight: "100vh", background: "#F7F7F5", color: "#1A1A1A" }}>
      <style>{`
        :root { --aam-accent: #C8F035; }
        html, body { margin: 0; padding: 0; background: #F7F7F5; }
        * { box-sizing: border-box; }
        .aam-pill-scroller::-webkit-scrollbar { display: none; }
        @keyframes aam-marquee { from { transform: translateX(0); } to { transform: translateX(-50%); } }
        @keyframes aam-pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(1.3); } }
        @media (max-width: 960px) { .aam-grid { grid-template-columns: repeat(2, 1fr) !important; } }
        @media (max-width: 720px) { .aam-event-row { grid-template-columns: 64px 1fr !important; } .aam-event-row > :last-child { grid-column: 1 / -1; text-align: left !important; } }
        @media (max-width: 640px) { .aam-grid { grid-template-columns: 1fr !important; } }
        button:focus-visible, input:focus-visible, a:focus-visible, select:focus-visible { outline: 2px solid #1A1A1A; outline-offset: 2px; }
      `}</style>

      <Header section={section} setSection={setSection} user={user} onLogout={onLogout} />
      <Hero heroVariant={heroVariant} section={section} />

      {section === "resources" && (
        <>
          <FilterBar query={query} setQuery={setQuery} activeCategory={activeCategory} setActiveCategory={setActiveCategory} activeFormat={activeFormat} setActiveFormat={setActiveFormat} resultCount={filtered.length}/>
          <ResourceGrid resources={filtered} clearFilters={clearFilters} query={query}/>
        </>
      )}
      {section === "directory" && <DirectorySection />}
      {section === "advocacy"  && <AdvocacySection />}
      {section === "programs"  && <ProgramsSection />}
      {section === "events"    && <EventsSection />}

      <Footer />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
